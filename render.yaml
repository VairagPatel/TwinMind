# Render configuration for TwinMind Backend
# This file enables one-click deployment from GitHub

services:
  - type: web
    name: twinmind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: ALLOWED_ORIGIN
        sync: false  # Set this manually in Render dashboard after frontend deployment
      - key: PORT
        value: 8080
    healthCheckPath: /api/health
    autoDeploy: true
