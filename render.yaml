# Render configuration for TwinMind Backend
# This file enables one-click deployment from GitHub

services:
  - type: web
    name: twinmind-backend
    runtime: java
    buildCommand: cd backend && mvn clean install -DskipTests
    startCommand: java -jar backend/target/twinmind-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: ALLOWED_ORIGIN
        sync: false  # Set this manually in Render dashboard after frontend deployment
      - key: PORT
        value: 8080
    healthCheckPath: /api/health
    autoDeploy: true
